_schema-version: "3.1"
ID: sap-cicd-demo
version: 1.0.2
description: "Mock CAP app for CI/CD demo"

modules:
  - name: sap-cicd-demo-srv
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      memory: 128M
      disk-quota: 256M
      no-route: true
    properties:
      TARGET_RUNTIME: nodejs
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
        - .git/
