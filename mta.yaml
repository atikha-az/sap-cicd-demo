_schema-version: "3.1"
ID: sap-cicd-demo
version: 1.0.0
description: "Mock CAP app for CI/CD demo"

modules:
  - name: sap-cicd-demo-srv
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      no-route: false
      routes:
        - route: sap-cicd-demo-srv-${space}.${default-domain}
    build-parameters:
      builder: npm
